<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Shop | Login</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800&display=swap" rel="stylesheet">
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: 'Nunito', sans-serif;
            background: #eef2f7;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .login-card {
            background: #fff;
            border-radius: 20px;
            padding: 40px 36px 32px;
            width: 100%;
            max-width: 360px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.10);
            text-align: center;
        }

        .login-card h2 {
            font-size: 1.55rem;
            font-weight: 800;
            color: #1a2340;
            margin-bottom: 20px;
        }

        /* Envelope SVG illustration */
        .envelope-wrap {
            display: flex;
            justify-content: center;
            align-items: center;
            margin-bottom: 28px;
        }
        .envelope-bg {
            width: 100px;
            height: 100px;
            background: radial-gradient(circle, #dce9ff 60%, #c3d8ff 100%);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
        }
        .dot {
            position: absolute;
            border-radius: 50%;
            background: #a3c0ff;
        }
        .dot-tl { width: 8px; height: 8px; top: 10px; left: 10px; }
        .dot-br { width: 6px; height: 6px; bottom: 14px; right: 6px; background: #c3d8ff; }

        /* Inputs */
        .form-group {
            margin-bottom: 14px;
            text-align: left;
        }
        .form-group input {
            width: 100%;
            padding: 12px 16px;
            border: 1.5px solid #e2e8f0;
            border-radius: 10px;
            font-family: 'Nunito', sans-serif;
            font-size: 0.93rem;
            color: #444;
            background: #fff;
            outline: none;
            transition: border-color 0.2s;
        }
        .form-group input::placeholder { color: #aab4c4; }
        .form-group input:focus { border-color: #3d72f8; }

        .form-options {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
            font-size: 0.85rem;
        }
        .form-options label {
            display: flex;
            align-items: center;
            gap: 6px;
            color: #6b7a99;
            cursor: pointer;
        }
        .form-options input[type="checkbox"] {
            accent-color: #3d72f8;
            width: 15px; height: 15px;
        }
        .form-options a {
            color: #3d72f8;
            text-decoration: none;
            font-weight: 700;
        }
        .form-options a:hover { text-decoration: underline; }

        .btn-login {
            width: 100%;
            padding: 13px;
            background: #3d72f8;
            color: #fff;
            border: none;
            border-radius: 10px;
            font-family: 'Nunito', sans-serif;
            font-size: 1rem;
            font-weight: 700;
            cursor: pointer;
            transition: background 0.2s, transform 0.1s;
            letter-spacing: 0.3px;
        }
        .btn-login:hover { background: #2c5de8; transform: translateY(-1px); }
        .btn-login:active { transform: translateY(0); }

        .divider {
            border: none;
            border-top: 1.5px solid #eef2f7;
            margin: 22px 0 16px;
        }

        .social-row {
            display: flex;
            gap: 10px;
            justify-content: center;
            margin-bottom: 20px;
        }
        .btn-social {
            flex: 1;
            padding: 10px;
            border: 1.5px solid #e2e8f0;
            border-radius: 10px;
            background: #fff;
            font-family: 'Nunito', sans-serif;
            font-size: 0.82rem;
            font-weight: 700;
            color: #444;
            cursor: pointer;
            transition: border-color 0.2s, background 0.2s;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 6px;
        }
        .btn-social:hover { border-color: #3d72f8; background: #f0f5ff; }

        .signup-link {
            font-size: 0.88rem;
            color: #8694b2;
        }
        .signup-link a {
            color: #3d72f8;
            font-weight: 800;
            text-decoration: none;
        }
        .signup-link a:hover { text-decoration: underline; }

        .messages-alert {
            background: #fef3c7;
            border: 1px solid #fcd34d;
            border-radius: 8px;
            padding: 8px 14px;
            margin-bottom: 14px;
            font-size: 0.85rem;
            color: #92400e;
            text-align: left;
        }
    </style>
</head>
<body>

    <div class="login-card">
        <h2>Welcome Back</h2>

        <!-- Envelope Illustration -->
        <div class="envelope-wrap">
            <div class="envelope-bg">
                <div class="dot dot-tl"></div>
                <div class="dot dot-br"></div>
                <svg width="56" height="44" viewBox="0 0 56 44" fill="none" xmlns="http://www.w3.org/2000/svg">
                    <!-- envelope body -->
                    <rect x="2" y="6" width="52" height="36" rx="5" fill="#4b8cfc"/>
                    <!-- envelope flap (top triangle) -->
                    <path d="M2 8 L28 26 L54 8" fill="none" stroke="#2563eb" stroke-width="2"/>
                    <!-- inner highlight -->
                    <rect x="2" y="6" width="52" height="36" rx="5" fill="url(#envgrad)" opacity="0.6"/>
                    <defs>
                        <linearGradient id="envgrad" x1="28" y1="6" x2="28" y2="42" gradientUnits="userSpaceOnUse">
                            <stop offset="0%" stop-color="#7cb3ff"/>
                            <stop offset="100%" stop-color="#2563eb" stop-opacity="0"/>
                        </linearGradient>
                    </defs>
                    <!-- shadow under envelope -->
                    <ellipse cx="28" cy="44" rx="22" ry="3" fill="#a3c0ff" opacity="0.4"/>
                </svg>
            </div>
        </div>

        <!-- Django messages -->
      {% for message in messages %} 
        <div class="messages-alert">{{ message }}</div> 
        {% endfor %} 

        <form action="" method="POST">
            {% csrf_token %} 

            <div class="form-group">
                <input type="email" name="login" placeholder="Email Address" required>
            </div>
            <div class="form-group">
                <input type="password" name="password" placeholder="Password" required>
            </div>

            <div class="form-options">
                <label>
                    <input type="checkbox" name="remember_me"> Remember Me
                </label>
                <a href="#">Forgot Password?</a>
            </div>

            <button type="submit" class="btn-login">Login</button>
        </form>

        <hr class="divider">

        <!-- Social login -->
        <div class="social-row">
            <button class="btn-social">
                <!-- Google icon -->
                <svg width="16" height="16" viewBox="0 0 48 48"><path fill="#EA4335" d="M24 9.5c3.54 0 6.71 1.22 9.21 3.6l6.85-6.85C35.9 2.38 30.47 0 24 0 14.62 0 6.51 5.38 2.56 13.22l7.98 6.19C12.43 13.72 17.74 9.5 24 9.5z"/><path fill="#4285F4" d="M46.98 24.55c0-1.57-.15-3.09-.38-4.55H24v9.02h12.94c-.58 2.96-2.26 5.48-4.78 7.18l7.73 6c4.51-4.18 7.09-10.36 7.09-17.65z"/><path fill="#FBBC05" d="M10.53 28.59c-.48-1.45-.76-2.99-.76-4.59s.27-3.14.76-4.59l-7.98-6.19C.92 16.46 0 20.12 0 24c0 3.88.92 7.54 2.56 10.78l7.97-6.19z"/><path fill="#34A853" d="M24 48c6.48 0 11.93-2.13 15.89-5.81l-7.73-6c-2.18 1.48-4.97 2.35-8.16 2.35-6.26 0-11.57-4.22-13.47-9.91l-7.98 6.19C6.51 42.62 14.62 48 24 48z"/></svg>
                Google
            </button>
            <button class="btn-social">
                <!-- Facebook icon -->
                <svg width="16" height="16" viewBox="0 0 24 24" fill="#1877F2"><path d="M24 12.073C24 5.405 18.627 0 12 0S0 5.405 0 12.073C0 18.1 4.388 23.094 10.125 24v-8.437H7.078v-3.49h3.047V9.41c0-3.025 1.792-4.697 4.533-4.697 1.312 0 2.686.235 2.686.235v2.97h-1.513c-1.491 0-1.956.93-1.956 1.886v2.269h3.328l-.532 3.49h-2.796V24C19.612 23.094 24 18.1 24 12.073z"/></svg>
                Facebook
            </button>
            <button class="btn-social">
                <!-- GitHub icon -->
                <svg width="16" height="16" viewBox="0 0 24 24" fill="#24292e"><path d="M12 0C5.374 0 0 5.373 0 12c0 5.302 3.438 9.8 8.207 11.387.599.111.793-.261.793-.577v-2.234c-3.338.726-4.033-1.416-4.033-1.416-.546-1.387-1.333-1.756-1.333-1.756-1.089-.745.083-.729.083-.729 1.205.084 1.839 1.237 1.839 1.237 1.07 1.834 2.807 1.304 3.492.997.107-.775.418-1.305.762-1.604-2.665-.305-5.467-1.334-5.467-5.931 0-1.311.469-2.381 1.236-3.221-.124-.303-.535-1.524.117-3.176 0 0 1.008-.322 3.301 1.23A11.509 11.509 0 0112 5.803c1.02.005 2.047.138 3.006.404 2.291-1.552 3.297-1.23 3.297-1.23.653 1.653.242 2.874.118 3.176.77.84 1.235 1.911 1.235 3.221 0 4.609-2.807 5.624-5.479 5.929.43.372.823 1.102.823 2.222v3.293c0 .319.192.694.801.576C20.566 21.797 24 17.3 24 12c0-6.627-5.373-12-12-12z"/></svg>
                GitHub
            </button>
        </div>

        <p class="signup-link">Don't have an account? <a href="#">Sign Up.</a></p>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
