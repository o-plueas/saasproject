<!DOCTYPE html>
<html>
<head>
    <title>SaaS App</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">

    <style>
        body {
            margin: 0;
            font-family: Arial;
            background: #f0f4fb;
            /* background: linear-gradient(135deg, #667eea, #764ba2); */
        }

        .auth-wrapper {
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .auth-card {
            background: white;
            padding: 35px;
            border-radius: 10px;
            width: 350px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
        }

        h2 {
            margin-bottom: 5px;
        }

        .subtitle {
            color: #777;
            margin-bottom: 20px;
            font-size: 14px;
        }

        input {
            width: 100%;
            padding: 12px;
            margin: 8px 0;
            border-radius: 6px;
            border: 1px solid #ddd;
        }

        button {
            width: 100%;
            padding: 12px;
            background: #667eea;
            color: white;
            border: none;
            border-radius: 6px;
            cursor: pointer;
        }

        button:hover {
            background: #5a67d8;
        }

        .divider {
            text-align: center;
            margin: 20px 0;
            color: #aaa;
        }

        .social-btn {
            display: block;
            text-align: center;
            padding: 10px;
            border-radius: 6px;
            color: white;
            text-decoration: none;
            margin-bottom: 10px;
        }

        .google { background: #db4437; }

        .footer-text {
            text-align: center;
            margin-top: 15px;
            font-size: 14px;
        }

        .link {
            color: #667eea;
            text-decoration: none;
        }

        .remember {
            display: flex;
            align-items: center;
            font-size: 14px;
        }

        .remember input {
            width: auto;
            margin-right: 5px;
        }
    </style>
</head>

<body>
    <div class="auth-wrapper">
        <div class="auth-card">
            {% block content %}{% endblock %}
        </div>
    </div>
</body>
</html>
