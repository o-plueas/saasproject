{% extends "account/base.html" %}

{% block content %}

<h2>Change Password</h2>
<p class="subtitle">Update your account password</p>

<form method="POST">
    {% csrf_token %}
    {{ form.non_field_errors }}

    <input type="password" name="oldpassword" placeholder="Current Password" required>
    <input type="password" name="password1" placeholder="New Password" required>
    <input type="password" name="password2" placeholder="Confirm New Password" required>

    <button type="submit">Change Password</button>
</form>

<p class="footer-text">
    <a class="link" href="{% url 'account_logout' %}">Back to Logout</a>
</p>

{% endblock %}
